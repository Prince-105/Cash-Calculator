<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"  href="/images/money-stack.png">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1 class="Header" >Cash Calculator</h1>
            <div class="dropdown">
                <button id="option" type="button">India ▼</button>
                <div id="dropdownMenu" class="dropdown-menu">
                    <a href="#" onclick="selectCountry('India'); 
                    return false;">India</a>
                    <a href="#" id="usaOption">USA</a>
                </div>
            </div>
        </div>
       
        <div class="row">
            <img src="../images/five_hundred_note.png" alt="Rs500">
            <input type="number" id="no500" class="cash-input" 
            placeholder="Enter the no of RS.500 Notes">
            <span id="txt500" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/two_hundred_note.png" alt="Rs200">
            <input type="number" id="no200" class="cash-input" 
            placeholder="Enter the no of RS.200 Notes">
            <span id="txt200" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/one_hundred.png" alt="Rs100">
            <input type="number" id="no100" class="cash-input" 
            placeholder="Enter the no of RS.100 Notes">
            <span id="txt100" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/fifty_note.png" alt="Rs50">
            <input type="number" id="no50" class="cash-input" 
            placeholder="Enter the no of RS.50 Notes">
            <span id="txt50" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/twenty_note.png" alt="Rs20">
            <input type="number" id="no20" class="cash-input" 
            placeholder="Enter the no of RS.20 Notes">
            <span id="txt20" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/ten_note.png" alt="Rs10">
            <input type="number" id="no10" class="cash-input" 
            placeholder="Enter the no of RS.10 Notes">
            <span id="txt10" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/one_note.png" alt="Rs1">
            <input type="number" id="no1" class="cash-input" 
            placeholder="Enter the no of RS.1 Notes">
            <span id="txt1" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/rs10.png" alt="coin10">
            <input type="number" id="nocoin10" class="cash-input" 
            placeholder="Enter the no of RS.10 Coins">
            <span id="txt1coin10" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/rs5.png" alt="coin5">
            <input type="number" id="nocoin5" class="cash-input" 
            placeholder="Enter the no of RS.5 Coins">
            <span id="txt1coin5" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/rs2.png" alt="coin2">
            <input type="number" id="nocoin2" class="cash-input" 
            placeholder="Enter the no of RS.2 Coins">
            <span id="txt1coin2" class="cash-text">0</span>
        </div>

        <div class="row">
            <img src="../images/rs1.png" alt="coin1">
            <input type="number" id="nocoin1" class="cash-input" 
            placeholder="Enter the no of RS.1 Coins">
            <span id="txt1coin1" class="cash-text">0</span>
        </div>
        





        <div class="btn-container">
            <button id="btnReset" type="button">Reset</button>
        </div>

        <div class="row result-part">
            <span id="txtFinalCash">Total Amount : 0</span>
            <span id="txtFinalCashInWords">Zero</span>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
